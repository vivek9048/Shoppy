<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fashion Collection</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(
        135deg,
        #7c2d12,
        #b45309,
        #f59e0b
    );
    color:white;
}

.back-btn{
    display:inline-block;
    margin:20px;
    padding:12px 25px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    background:#1d4ed8;
}

h1{
    text-align:center;
    padding:20px;
    font-size:3rem;
    letter-spacing:2px;
}

.products{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:30px;
    padding-bottom:50px;
}

.card{
    background:white;
    color:black;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    transition:.3s;
    text-align:center;
    padding-bottom:20px;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.card h3{
    margin-top:15px;
    font-size:22px;
}

.card p{
    margin:10px 0;
    color:#dc2626;
    font-weight:bold;
    font-size:20px;
}

button{
    background:#dc2626;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#b91c1c;
}

</style>

</head>
<body>

<a href="jk.html" class="back-btn">← Back to Home</a>

<h1>👗 Fashion Collection</h1>

<div class="products">

    <div class="card">

    <div class="card">

    <div class="card">

    <div class="card">

</div>

</body>
</html>
