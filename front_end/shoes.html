<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shoes Collection</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(
        135deg,
        #000000,
        #1a1a1a,
        #611d1d
    );
    color:white;
}

h1{
    text-align:center;
    padding:40px 20px;
    font-size:3rem;
    letter-spacing:2px;
}

.products{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    padding-bottom:50px;
}

.card{
    background:white;
    color:black;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    transition:.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.card h3{
    margin-top:15px;
    font-size:24px;
}

.card p{
    margin:10px 0;
    color:#2563eb;
    font-weight:bold;
    font-size:20px;
}

.card{
    text-align:center;
    padding-bottom:20px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<h1>👟 Premium Shoes Collection</h1>

<div class="products">

    <div class="card">
        <img src="shoes/Men's Sports Shoes, Men's Casual Shoes, Fashionable And Personalized Street Student Handsome Shoes, Lace Up Men's Shoes, Men's Board Shoes.jpg" alt="Nike">
        <h3>Nike Air Max</h3>
        <p>$120</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="shoes/Men's Fashionable Casual Low-Top Sneakers.jpg" alt="Adidas">
        <h3>Adidas Run</h3>
        <p>$110</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="shoes/Men Letter Detail Colorblock Skate Shoes.jpg" alt="Puma">
        <h3>Puma Sport</h3>
        <p>$95</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="shoes/Men Letter Detail Colorblock Skate Shoes.jpg" alt="Reebok">
        <h3>Reebok Classic</h3>
        <p>$105</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="shoes/Men's Fashionable Casual Low-Top Sneakers.jpg" alt="Jordan">
        <h3>Jordan Retro</h3>
        <p>$180</p>
        <button>Add to Cart</button>
    </div>

</div>

</body>
</html>
