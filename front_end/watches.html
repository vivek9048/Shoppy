<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Watches Collection</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
    );
    color:white;
}

h1{
    text-align:center;
    padding:40px 20px;
    font-size:3rem;
    letter-spacing:2px;
}

.products{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    padding-bottom:50px;
}

.card{
    background:white;
    color:black;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    transition:.3s;
    text-align:center;
    padding-bottom:20px;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.card h3{
    margin-top:15px;
    font-size:24px;
}

.card p{
    margin:10px 0;
    color:#f59e0b;
    font-weight:bold;
    font-size:20px;
}

button{
    background:#f59e0b;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#d97706;
}

.back-btn{
    display:inline-block;
    margin:20px;
    padding:12px 25px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.back-btn:hover{
    background:#1d4ed8;
}

</style>
</head>

<body>

<a href="jk.html" class="back-btn">← Back to Home</a>

<h1>⌚ Luxury Watch Collection</h1>

<div class="products">

    <div class="card">
        <img src="watches/Minimalist stainless steel dress watch – sleek bracelet design for men’s formal & casual looks.jpg" alt="Rolex">
        <h3>Rolex Submariner</h3>
        <p>$999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="watches/fwd Timex Watch.jpg" alt="Titan">
        <h3>Titan Edge</h3>
        <p>$199</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="watches/fwd Timex Watch.jpg" alt="Fossil">
        <h3>Fossil Gen 6</h3>
        <p>$249</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="watches/download (3).jpg" alt="Casio">
        <h3>Casio G-Shock</h3>
        <p>$149</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="watches/Minimalist stainless steel dress watch – sleek bracelet design for men’s formal & casual looks.jpg" alt="Apple Watch">
        <h3>Apple Watch Ultra</h3>
        <p>$499</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="watches/Minimalist stainless steel dress watch – sleek bracelet design for men’s formal & casual looks.jpg" alt="TAG Heuer">
        <h3>TAG Heuer Carrera</h3>
        <p>$799</p>
        <button>Add to Cart</button>
    </div>

</div>

</body>
</html>
